version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: route-planner-backend
    restart: unless-stopped
    environment:
      - PORT=3001
    networks:
      - route-planner

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: route-planner-frontend
    restart: unless-stopped
    ports:
      - "8081:80"
    depends_on:
      - backend
    networks:
      - route-planner

networks:
  route-planner:
    driver: bridge
