version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: routeplaner-backend
    restart: unless-stopped
    environment:
      - PORT=3001
    networks:
      - routeplaner

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: routeplaner-frontend
    restart: unless-stopped
    ports:
      - "8081:80"
    depends_on:
      - backend
    networks:
      - routeplaner

networks:
  routeplaner:
    driver: bridge
